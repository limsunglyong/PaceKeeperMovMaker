<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PaceKeeper — Movie Maker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* pro NLE neutral palette */
    --bg: #0c0d10;
    --panel: #14151a;
    --panel-2: #1a1c22;
    --elev: #22242c;
    --elev-2: #2b2e38;
    --line: rgba(255,255,255,0.065);
    --line-2: rgba(255,255,255,0.035);
    --txt: #e8eaf0;
    --dim: #868a98;
    --dim-2: #5f636f;
    --accent: #5b8cff;     /* selection blue */
    --accent-d: #3f6fe0;
    --hi: #ff4d5e;         /* record / active red */
    --cyan: #2dd4bf;       /* audio teal */
    --led: #58ffd0;        /* LED timecode */
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: Inter, system-ui, sans-serif;
    background: var(--bg); color: var(--txt);
    overflow: hidden; -webkit-font-smoothing: antialiased;
    font-size: 14px;
  }
  #root { height: 100vh; }
  button { font-family: inherit; cursor: pointer; color: inherit; border: none; background: none; }
  input, textarea { font-family: inherit; }
  ::-webkit-scrollbar { height: 11px; width: 11px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--elev); border-radius: 6px; border: 3px solid var(--panel); }
  ::-webkit-scrollbar-thumb:hover { background: var(--elev-2); }

  .app { display: flex; flex-direction: column; height: 100vh; }

  /* ================= HEADER ================= */
  .header {
    display: flex; align-items: center; gap: 22px;
    height: 58px; padding: 0 18px; flex: 0 0 auto;
    background: var(--panel); border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: center; gap: 10px; width: 160px; }
  .logo-mark {
    width: 26px; height: 26px; border-radius: 7px;
    background: conic-gradient(from 200deg, var(--accent), var(--cyan), var(--hi), var(--accent));
    box-shadow: 0 0 0 1px rgba(255,255,255,0.08), inset 0 0 8px rgba(0,0,0,0.4);
  }
  .brand-name { font-weight: 700; letter-spacing: -0.2px; font-size: 16px; }

  .transport { display: flex; align-items: center; gap: 7px; margin: 0 auto; }
  .t-btn {
    width: 38px; height: 38px; border-radius: 9px;
    background: var(--elev); display: grid; place-items: center;
    color: var(--txt); transition: background .14s, transform .08s, color .14s;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .t-btn:hover { background: var(--elev-2); }
  .t-btn:active { transform: scale(0.92); }
  .t-btn.stop:hover { color: var(--hi); }
  .t-btn.play {
    width: 48px; height: 42px; border-radius: 11px;
    background: linear-gradient(180deg, var(--accent), var(--accent-d));
    color: #fff; box-shadow: 0 4px 14px rgba(91,140,255,0.35);
  }
  .t-btn.play:hover { filter: brightness(1.08); }

  /* LED timecode */
  .led-wrap { display: flex; align-items: center; gap: 12px; margin-left: 10px; }
  .led-rec { width: 10px; height: 10px; border-radius: 50%; background: var(--dim-2); transition: .2s; }
  .led-rec.live { background: var(--hi); box-shadow: 0 0 10px var(--hi); animation: pulseRec 1.1s ease-in-out infinite; }
  @keyframes pulseRec { 50% { opacity: 0.4; } }
  .led {
    position: relative; font-family: var(--mono); font-weight: 700;
    font-size: 23px; letter-spacing: 2px; font-variant-numeric: tabular-nums;
    background: #06100d; border: 1px solid rgba(88,255,208,0.16);
    border-radius: 8px; padding: 6px 14px;
    box-shadow: inset 0 0 16px rgba(0,0,0,0.7), inset 0 0 2px rgba(88,255,208,0.1);
  }
  .led-ghost { color: rgba(88,255,208,0.08); }
  .led-val {
    position: absolute; left: 14px; top: 6px;
    color: var(--led); text-shadow: 0 0 9px rgba(88,255,208,0.55);
  }
  .led-total {
    font-family: var(--mono); font-size: 12px; color: var(--dim);
    font-variant-numeric: tabular-nums; display: flex; flex-direction: column; line-height: 1.25;
  }
  .led-total-lbl { font-size: 9px; letter-spacing: 2px; color: var(--dim-2); }

  .export {
    background: var(--hi); color: #fff; font-weight: 700; font-size: 13px;
    padding: 11px 18px; border-radius: 9px; transition: filter .14s; white-space: nowrap;
    box-shadow: 0 4px 14px rgba(255,77,94,0.28);
  }
  .export:hover { filter: brightness(1.08); }
  .export.busy { background: var(--elev); box-shadow: none; cursor: wait; }

  /* ================= BODY ================= */
  .body { flex: 1 1 auto; display: flex; min-height: 0; }

  /* projects rail */
  .rail {
    flex: 0 0 168px; width: 168px; background: var(--panel);
    border-right: 1px solid var(--line); display: flex; flex-direction: column; min-height: 0;
  }
  .rail-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 14px 8px;
  }
  .rail-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.6px; color: var(--dim); font-weight: 700; }
  .rail-new { width: 24px; height: 24px; border-radius: 7px; background: var(--elev); font-size: 16px; line-height: 1; display: grid; place-items: center; color: var(--dim); }
  .rail-new:hover { background: var(--accent); color: #fff; }
  .rail-save { padding: 0 14px 10px; display: flex; flex-direction: column; gap: 7px; border-bottom: 1px solid var(--line); }
  .proj-name {
    width: 100%; background: var(--bg); border: 1px solid var(--line); color: var(--txt);
    border-radius: 7px; padding: 8px 9px; font-size: 12px;
  }
  .proj-name:focus { outline: none; border-color: var(--accent); }
  .save-btn { width: 100%; background: var(--accent); color: #fff; font-weight: 600; font-size: 12px; padding: 8px; border-radius: 7px; transition: filter .14s; }
  .save-btn:hover { filter: brightness(1.1); }

  .proj-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 9px; }
  .proj-empty { color: var(--dim-2); font-size: 11px; text-align: center; padding: 18px 6px; line-height: 1.6; }
  .proj-card { border-radius: 9px; overflow: hidden; cursor: pointer; background: var(--panel-2); border: 1px solid var(--line); transition: border-color .14s, transform .08s; }
  .proj-card:hover { border-color: var(--elev-2); }
  .proj-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .proj-thumb { position: relative; aspect-ratio: 16/9; background: #05060a; }
  .proj-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .proj-noimg { width: 100%; height: 100%; background: repeating-linear-gradient(45deg,#15171d,#15171d 6px,#1a1c22 6px,#1a1c22 12px); }
  .proj-del { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border-radius: 6px; background: rgba(0,0,0,0.55); color: #fff; font-size: 11px; display: grid; place-items: center; opacity: 0; transition: .14s; }
  .proj-card:hover .proj-del { opacity: 1; }
  .proj-del:hover { background: var(--hi); }
  .proj-meta { padding: 7px 9px; display: flex; flex-direction: column; gap: 2px; }
  .proj-cname { font-size: 12px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .proj-time { font-size: 10px; color: var(--dim-2); font-family: var(--mono); }

  /* center */
  .center { flex: 1 1 auto; display: flex; flex-direction: column; min-width: 0; }
  .preview {
    flex: 1 1 auto; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #101117, #0a0b0f);
    min-height: 0; padding: 22px;
  }
  .canvas-wrap { position: relative; height: 100%; aspect-ratio: 16 / 9; max-width: 100%; }
  .stage {
    position: absolute; inset: 0; width: 100%; height: 100%;
    background: #05060a; border-radius: 10px;
    box-shadow: 0 18px 60px rgba(0,0,0,0.6), 0 0 0 1px var(--line);
  }
  .rec-badge {
    position: absolute; top: 14px; left: 14px; display: flex; align-items: center; gap: 7px;
    background: rgba(255,77,94,0.92); color: #fff; font-size: 12px; font-weight: 800;
    letter-spacing: 1px; padding: 5px 11px; border-radius: 7px;
  }
  .rec-dot { width: 9px; height: 9px; border-radius: 50%; background: #fff; animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0.25; } }

  /* toolbar */
  .toolbar {
    flex: 0 0 auto; display: flex; align-items: center; gap: 8px;
    padding: 11px 16px; background: var(--panel); border-top: 1px solid var(--line); flex-wrap: wrap;
  }
  .tool {
    background: var(--elev); color: var(--txt); font-size: 13px; font-weight: 600;
    padding: 9px 14px; border-radius: 8px; white-space: nowrap;
    transition: background .14s; box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .tool:hover { background: var(--elev-2); }
  .tool.sm { padding: 8px 11px; font-size: 12px; }
  .tool.toggle.on { background: var(--accent); box-shadow: none; }
  .tool.toggle.on:hover { background: var(--accent-d); }
  .div { width: 1px; height: 22px; background: var(--line); margin: 0 3px; }
  .bpm-field { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }
  .bpm-field input {
    width: 62px; background: var(--bg); border: 1px solid var(--line); color: var(--txt);
    font-family: var(--mono); font-size: 15px; font-weight: 700; padding: 7px 8px; border-radius: 7px; text-align: center;
  }
  .bpm-field input:focus { outline: none; border-color: var(--accent); }

  /* ================= INSPECTOR ================= */
  .inspector { flex: 0 0 300px; width: 300px; background: var(--panel); border-left: 1px solid var(--line); overflow-y: auto; padding: 18px; }
  .insp h3, .insp-empty h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1.4px; color: var(--accent); margin-bottom: 16px; font-weight: 700; }
  .insp-empty p { color: var(--dim); font-size: 13px; line-height: 1.6; margin-bottom: 20px; }
  .proj-stats { display: flex; flex-direction: column; gap: 1px; background: var(--line); border-radius: 9px; overflow: hidden; }
  .proj-stats > div { display: flex; justify-content: space-between; align-items: center; background: var(--bg); padding: 11px 13px; }
  .proj-stats span { color: var(--dim); font-size: 12px; }
  .proj-stats b { font-size: 12px; font-weight: 600; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--mono); }

  .row { margin-bottom: 15px; }
  .row-label { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; font-weight: 600; }
  .row-label b { color: var(--cyan); font-family: var(--mono); font-weight: 500; text-transform: none; }
  .two { display: flex; gap: 10px; }
  .two .row { flex: 1; }
  .ta, .num { width: 100%; background: var(--bg); border: 1px solid var(--line); color: var(--txt); border-radius: 7px; padding: 9px 10px; font-size: 13px; resize: vertical; }
  .num { font-family: var(--mono); }
  .ta:focus, .num:focus { outline: none; border-color: var(--accent); }

  input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; background: var(--elev); border-radius: 3px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 0 3px rgba(91,140,255,0.2); }
  input[type=range]::-moz-range-thumb { width: 15px; height: 15px; border: none; border-radius: 50%; background: var(--accent); cursor: pointer; }

  /* visualizer style picker */
  .viz-styles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .vz { background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 9px 4px 7px; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 10px; color: var(--dim); transition: .14s; }
  .vz:hover { border-color: var(--elev-2); color: var(--txt); }
  .vz.on { border-color: var(--accent); color: var(--txt); background: rgba(91,140,255,0.08); }
  .vz-ico { width: 30px; height: 18px; background-size: contain; background-repeat: no-repeat; background-position: center; opacity: 0.85; }
  .vz-bars { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='30' height='18'><g fill='%232dd4bf'><rect x='1' y='9' width='3' height='9'/><rect x='6' y='4' width='3' height='14'/><rect x='11' y='11' width='3' height='7'/><rect x='16' y='2' width='3' height='16'/><rect x='21' y='7' width='3' height='11'/><rect x='26' y='12' width='3' height='6'/></g></svg>"); }
  .vz-mirror { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='30' height='18'><g fill='%232dd4bf'><rect x='1' y='5' width='3' height='8'/><rect x='6' y='2' width='3' height='14'/><rect x='11' y='6' width='3' height='6'/><rect x='16' y='1' width='3' height='16'/><rect x='21' y='4' width='3' height='10'/><rect x='26' y='6' width='3' height='6'/></g></svg>"); }
  .vz-wave { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='30' height='18'><path d='M1 12 Q5 2 9 9 T17 7 T25 11 T29 6' stroke='%232dd4bf' stroke-width='1.6' fill='none'/></svg>"); }
  .vz-circle { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='30' height='18'><g stroke='%232dd4bf' stroke-width='1.4'><circle cx='15' cy='9' r='4' fill='none'/><line x1='15' y1='3' x2='15' y2='1'/><line x1='21' y1='9' x2='23' y2='9'/><line x1='15' y1='15' x2='15' y2='17'/><line x1='9' y1='9' x2='7' y2='9'/></g></svg>"); }
  .vz-dots { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='30' height='18'><g fill='%232dd4bf'><circle cx='4' cy='9' r='2'/><circle cx='11' cy='9' r='3.4'/><circle cx='19' cy='9' r='2.6'/><circle cx='26' cy='9' r='1.8'/></g></svg>"); }

  .seg { display: flex; gap: 4px; background: var(--bg); padding: 3px; border-radius: 8px; }
  .seg button { flex: 1; background: transparent; color: var(--dim); padding: 7px; border-radius: 6px; font-size: 12px; font-weight: 600; text-transform: capitalize; }
  .seg button.on { background: var(--elev); color: var(--txt); }
  .bpm-big { display: flex; gap: 8px; }
  .bpm-big input { flex: 1; background: var(--bg); border: 1px solid var(--line); color: var(--txt); font-family: var(--mono); font-size: 22px; font-weight: 700; text-align: center; border-radius: 7px; padding: 8px; }
  .bpm-big input:focus { outline: none; border-color: var(--accent); }
  .bpm-big button { background: var(--elev); border-radius: 7px; padding: 0 16px; font-weight: 600; }
  .bpm-big button:hover { background: var(--elev-2); }

  .swatches { display: flex; gap: 8px; }
  .sw { width: 30px; height: 30px; border-radius: 7px; border: 2px solid var(--line); }
  .sw.on { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(91,140,255,0.35); }

  .danger { width: 100%; margin-top: 8px; background: transparent; border: 1px solid var(--hi); color: var(--hi); font-weight: 600; padding: 9px; border-radius: 8px; font-size: 13px; transition: .14s; }
  .danger:hover { background: var(--hi); color: #fff; }

  /* ================= TIMELINE ================= */
  .timeline { flex: 0 0 auto; height: 280px; background: var(--panel); border-top: 1px solid var(--line); display: flex; flex-direction: column; position: relative; }
  .tl-labels { position: absolute; left: 0; z-index: 5; width: 158px; background: var(--panel-2); border-right: 1px solid var(--line); }
  .tl-ruler-spacer { height: 26px; border-bottom: 1px solid var(--line); }
  .lane-label { height: 44px; display: flex; align-items: center; gap: 9px; padding: 0 12px; font-size: 12px; font-weight: 600; color: var(--dim); border-bottom: 1px solid var(--line-2); }
  .lane-id { width: 20px; height: 20px; border-radius: 5px; color: #05070c; font-size: 11px; font-weight: 800; display: grid; place-items: center; }
  .tl-scroll { flex: 1; overflow-x: auto; overflow-y: hidden; margin-left: 158px; position: relative; }
  .tl-inner { position: relative; height: 100%; min-height: 246px; }
  .ruler { height: 26px; position: relative; border-bottom: 1px solid var(--line); }
  .tick { position: absolute; top: 0; height: 26px; border-left: 1px solid var(--line-2); }
  .tick span { position: absolute; left: 4px; top: 7px; font-family: var(--mono); font-size: 10px; color: var(--dim-2); }
  .lane { height: 44px; border-bottom: 1px solid var(--line-2); position: relative; }
  .bpm-lane { cursor: pointer; }
  .bpm-tag { position: sticky; left: 8px; top: 13px; display: inline-block; font-family: var(--mono); font-size: 11px; color: var(--hi); background: rgba(12,13,16,0.7); padding: 2px 6px; border-radius: 4px; pointer-events: none; }

  .block { position: absolute; top: 6px; height: 32px; border-radius: 6px; display: flex; align-items: center; padding: 0 8px; overflow: hidden; font-size: 11px; font-weight: 600; user-select: none; }
  .block-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none; }
  .block-name.over { position: relative; z-index: 2; color: #04201c; text-shadow: 0 1px 2px rgba(255,255,255,0.25); }
  .block.vid { background: linear-gradient(180deg, #5b8cff, #3f6fe0); color: #fff; cursor: default; }
  .block.aud { background: rgba(45,212,191,0.1); border: 1px solid rgba(45,212,191,0.4); padding: 0; }
  .block.aud .wave { position: absolute; inset: 0; width: 100%; height: 100%; }
  .block.aud .block-name { position: absolute; left: 8px; top: 9px; }
  .block.viz { background: linear-gradient(180deg, #a78bfa, #8b6df0); color: #fff; cursor: pointer; }
  .block.viz.sel, .block.sub.sel { outline: 2px solid var(--accent); outline-offset: 1px; }
  .block.sub { height: 15px; background: linear-gradient(180deg, #ffb020, #e69408); color: #3a2600; cursor: grab; font-size: 10px; }
  .block.sub.logo { background: linear-gradient(180deg, #eef2ff, #c7d2fe); color: #1e2547; }
  .block.sub:active { cursor: grabbing; }
  .handle { position: absolute; top: 0; width: 9px; height: 100%; cursor: ew-resize; background: rgba(255,255,255,0.35); }
  .handle.l { left: 0; border-radius: 6px 0 0 6px; }
  .handle.r { right: 0; border-radius: 0 6px 6px 0; }
  .handle:hover { background: #fff; }

  .playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--hi); z-index: 4; pointer-events: none; }
  .ph-head { position: absolute; top: 0; left: -5px; width: 12px; height: 12px; background: var(--hi); clip-path: polygon(0 0, 100% 0, 50% 100%); }

  .tl-foot { height: 34px; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; border-top: 1px solid var(--line); background: var(--panel-2); }
  .status { font-size: 12px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .zoom { display: flex; align-items: center; gap: 6px; flex: 0 0 auto; }
  .zoom button { width: 26px; height: 24px; background: var(--elev); border-radius: 6px; font-size: 14px; color: var(--txt); }
  .zoom button:hover { background: var(--elev-2); }
  .zoom .fit { width: auto; padding: 0 10px; font-size: 11px; font-weight: 600; }
  .zoom-hint { font-size: 10px; color: var(--dim-2); font-family: var(--mono); margin-left: 6px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="helpers.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="editor.jsx"></script>
</body>
</html>
